name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: "ubuntu-latest"
    name: Run tests
    steps:
      - uses: "actions/checkout@v6"
      - name: Set up Python
        uses: "actions/setup-python@v6"
        with:
          python-version: "3.14"
      - name: Install uv
        uses: "astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9" # v9.0.0
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint with Ruff
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Test with pytest
        run: uv run pytest -vv --cov=custom_components/erftverband_riverlevel --cov-report=term-missing
