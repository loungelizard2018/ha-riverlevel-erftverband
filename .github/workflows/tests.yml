name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: "ubuntu-latest"
    name: Run tests
    steps:
      - uses: "actions/checkout@v7"
      - name: Set up Python
        uses: "actions/setup-python@v6"
        with:
          python-version: "3.14"
      - name: Install uv
        uses: "astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b" # v8.1.0
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint with Ruff
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Test with pytest
        id: pytest
        shell: bash
        run: |
          set +e
          uv run pytest -q --tb=short --cov=custom_components/erftverband_riverlevel --cov-report=term-missing 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log
          if-no-files-found: error
      - name: Fail if pytest failed
        if: steps.pytest.outputs.status != '0'
        run: exit 1
