name: Release

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
      - "custom_components/erftverband_riverlevel/manifest.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read integration version
        id: version
        shell: bash
        run: |
          version=$(python -c 'import json; print(json.load(open("custom_components/erftverband_riverlevel/manifest.json"))["version"])')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          awk -v version="$VERSION" '
            $0 == "## v" version {found=1; next}
            found && /^## / {exit}
            found {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf "Erftverband River Levels v%s\n" "$VERSION" > release-notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do."
            exit 0
          fi
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file release-notes.md
