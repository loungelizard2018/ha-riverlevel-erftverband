type: vertical-stack
cards:
  - type: custom:button-card
    layout: vertical
    styles:
      card:
        - border-radius: 12px
        - padding: 16px
        - box-shadow: 0 2px 8px rgba(0,0,0,0.15)
      grid:
        - grid-template-areas: '"top" "middle" "bottom"'
        - grid-template-columns: 1fr
        - grid-template-rows: auto 1fr auto
    custom_fields:
      top:
        - type: state-label
          entity: sensor.essig_orbach_flood_status
          style: |
            paper-item { font-size: 14px; font-weight: 500; color: var(--primary-text-color); }
      middle:
        - type: state-label
          entity: sensor.essig_orbach_water_level
          style: |
            paper-item { font-size: 36px; font-weight: 700; color: #4fc3f7; }
      bottom:
        - type: state-label
          entity: sensor.essig_orbach_discharge
          style: |
            paper-item { font-size: 16px; color: #81deea; }
    tap_action:
      action: url
      url_path: >-
        https://www.erftverband.de/mapserver/arcshp/flussgebiet/klima_abfluss/howis/html/pegel/Pegel_Essig_zr.html

  - type: custom:apexcharts-card
    graph_span: 48h
    span:
      hours: 48
    now:
      show: true
    yaxis:
      - id: left
        min: 0
        title:
          text: Wasserstand (cm)
      - id: right
        opposite: true
        min: 0
        title:
          text: Abfluss (m³/s)
    series:
      - entity: sensor.essig_orbach_water_level
        name: Wasserstand
        yaxis_id: left
        stroke_width: 2
        color: "#4fc3f7"
        type: line
        show:
          in_header: false
        data_generator: |-
          return entity.attributes.history || [];
      - entity: sensor.essig_orbach_discharge
        name: Abfluss
        yaxis_id: right
        stroke_width: 2
        stroke_dash: 4
        color: "#81deea"
        type: line
        show:
          in_header: false
        data_generator: |-
          return entity.attributes.history || [];
    annotations:
      - yaxis_id: left
        y_ref: 60
        label:
          text: "EV 60cm"
          align: left
        stroke:
          color: "#ffb300"
          dash: 4
      - yaxis_id: left
        y_ref: 144
        label:
          text: "HQ10 144cm"
          align: left
        stroke:
          color: "#ff6d00"
          dash: 4
