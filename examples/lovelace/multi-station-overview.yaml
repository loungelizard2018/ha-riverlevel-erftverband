type: grid
columns: 2
square: false
card_mod:
  style: |
    @media (max-width: 700px) {
      .grid-container {
        grid-template-columns: 1fr !important;
      }
    }
cards:
  - type: vertical-stack
    cards:
      - type: custom:button-card
        entity: sensor.essig_water_level
        show_name: false
        show_state: false
        show_icon: false
        styles:
          card:
            - background: "linear-gradient(135deg, rgba(10,14,22,.96), rgba(20,28,40,.92)), radial-gradient(circle at 20% 0%, rgba(0,150,220,.18), transparent 40%)"
            - border: 1px solid rgba(255,255,255,.12)
            - border-radius: 20px
            - box-shadow: 0 12px 28px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.08)
            - padding: 14px
            - overflow: hidden
          grid:
            - grid-template-areas: '"name name" "water date" "discharge age" "trend status"'
            - grid-template-columns: 1fr 1fr
            - grid-template-rows: auto
        custom_fields:
          name: >
            <div style="font-size:15px;font-weight:800;letter-spacing:.04em;color:#e8ecf4;margin-bottom:4px">
              🌊 Essig (Orbach)
            </div>
          water: >
            <div style="font-size:28px;font-weight:900;color:#4fc3f7;line-height:1">
              <span>[[[
                var s = states['sensor.essig_water_level'].state;
                return (s && s !== 'unavailable' && s !== 'none') ? s : '—';
              ]]]</span>
              <span style="font-size:12px;font-weight:600;color:#8e9bad;margin-left:2px">cm</span>
            </div>
          date: >
            <div style="text-align:right;color:#8e9bad;font-size:10px;line-height:1.3">
              <div>[[[
                var m = states['sensor.essig_last_measurement'].state;
                if (m && m !== 'unavailable') {
                  var d = new Date(m);
                  return d.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
                }
                return '—';
              ]]]</div>
            </div>
          discharge: >
            <div style="font-size:20px;font-weight:800;color:#81deea;line-height:1.2">
              <span>[[[
                var s = states['sensor.essig_discharge'].state;
                return (s && s !== 'unavailable' && s !== 'none') ? s : '—';
              ]]]</span>
              <span style="font-size:10px;font-weight:600;color:#8e9bad;margin-left:2px">m³/s</span>
            </div>
          age: >
            <div style="text-align:right;font-size:13px;font-weight:700;color:#b0bcca;line-height:1.2">
              <span>[[[
                var s = states['sensor.essig_data_age'].state;
                return (s && s !== 'unavailable') ? s + ' min' : '—';
              ]]]</span>
            </div>
          trend: >
            <div style="font-size:14px;font-weight:700">[[[
              var t = states['sensor.essig_water_trend_raw'].state;
              if (t === 'unavailable' || t === 'none' || t === '') return '—';
              var v = parseFloat(t);
              if (isNaN(v)) return '—';
              if (v > 0) return '⬆ ' + t;
              if (v < 0) return '⬇ ' + t;
              return '➡ 0';
            ]]]</div>
          status: >
            <div style="text-align:right">
              <span style="display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700;[[[
                var s = states['sensor.essig_flood_status'].state;
                if (s === 'extreme') return 'background:#4a1520;color:#ff4444';
                if (s === 'hq100') return 'background:#6b2f3a;color:#ff6b6b';
                if (s === 'hq10') return 'background:#8b4530;color:#ff9a67';
                if (s === 'ev_action') return 'background:#6b5f2a;color:#ffd54f';
                if (s === 'unknown') return 'background:#5a3744;color:#ff7777';
                return 'background:#1a3a4a;color:#4fc3f7';
              ]]]">[[[
                var s = states['sensor.essig_flood_status'].state;
                if (s === 'unknown') return 'veraltet';
                if (s === 'extreme') return 'HQextr.';
                if (s === 'hq100') return 'HQ100';
                if (s === 'hq10') return 'HQ10';
                if (s === 'ev_action') return 'EV';
                return 'OK';
              ]]]</span>
            </div>
        tap_action:
          action: url
          url_path: "https://www.erftverband.de/mapserver/arcshp/flussgebiet/klima_abfluss/howis/html/pegel/Pegel_Essig_zr.html"

