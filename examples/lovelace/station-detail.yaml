type: vertical-stack
cards:
  - type: custom:button-card
    entity: sensor.essig_water_level
    show_name: false
    show_state: false
    show_icon: false
    styles:
      card:
        - background: "linear-gradient(135deg, rgba(10,14,22,.96), rgba(20,28,40,.92)), radial-gradient(circle at 20% 0%, rgba(0,150,220,.18), transparent 40%)"
        - border: 1px solid rgba(255,255,255,.12)
        - border-radius: 20px
        - box-shadow: 0 12px 28px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.08)
        - padding: 16px
        - overflow: hidden
      grid:
        - grid-template-areas: '"name name" "water date" "discharge age" "trend status" "alert alert"'
        - grid-template-columns: 1fr 1fr
        - grid-template-rows: auto
    custom_fields:
      name: >
        <div style="font-size:20px;font-weight:800;letter-spacing:.04em;color:#e8ecf4;margin-bottom:8px">
          🌊 Essig – Orbach
        </div>
        <div style="font-size:12px;color:#8e9bad;margin-bottom:4px">
          Pegelbetreiber: Erftverband
        </div>
      water: >
        <div>
          <div style="font-size:12px;color:#8e9bad;font-weight:600;letter-spacing:.06em;margin-bottom:2px">WASSERSTAND</div>
          <div style="font-size:48px;font-weight:900;color:#4fc3f7;line-height:1">
            <span>[[[
              var s = states['sensor.essig_water_level'].state;
              return (s && s !== 'unavailable' && s !== 'none') ? s : '—';
            ]]]</span>
            <span style="font-size:16px;font-weight:600;color:#8e9bad;margin-left:4px">cm</span>
          </div>
        </div>
      date: >
        <div style="text-align:right;color:#8e9bad;font-size:12px;line-height:1.5">
          <div style="color:#b0bcca;font-size:15px">[[[
            var m = states['sensor.essig_last_measurement'].state;
            if (m && m !== 'unavailable') {
              var d = new Date(m);
              return d.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
            }
            return '—';
          ]]]</div>
          <div>Letzte Messung</div>
        </div>
      discharge: >
        <div style="margin-top:12px">
          <div style="font-size:12px;color:#8e9bad;font-weight:600;letter-spacing:.06em;margin-bottom:2px">ABFLUSS</div>
          <div style="font-size:32px;font-weight:800;color:#81deea;line-height:1.2">
            <span>[[[
              var s = states['sensor.essig_discharge'].state;
              return (s && s !== 'unavailable' && s !== 'none') ? s : '—';
            ]]]</span>
            <span style="font-size:14px;font-weight:600;color:#8e9bad;margin-left:2px">m³/s</span>
          </div>
        </div>
      age: >
        <div style="margin-top:12px;text-align:right">
          <div style="font-size:12px;color:#8e9bad;font-weight:600;letter-spacing:.06em;margin-bottom:2px">DATENALTER</div>
          <div style="font-size:22px;font-weight:700;color:#b0bcca;line-height:1.2">
            <span>[[[
              var s = states['sensor.essig_data_age'].state;
              return (s && s !== 'unavailable') ? s + ' min' : '—';
            ]]]</span>
          </div>
        </div>
      trend: >
        <div style="margin-top:12px;display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:#8e9bad;font-weight:600">TREND WASSERSTAND</span>
          <span style="font-size:20px;font-weight:700">[[[
            var t = states['sensor.essig_water_trend_raw'].state;
            if (t === 'unavailable' || t === 'none' || t === '') return '—';
            var v = parseFloat(t);
            if (isNaN(v)) return '—';
            if (v > 0) return '⬆ ' + t + ' cm/h';
            if (v < 0) return '⬇ ' + t + ' cm/h';
            return '➡ 0 cm/h';
          ]]]</span>
        </div>
        <div style="margin-top:4px;display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:#8e9bad;font-weight:600">TREND ABFLUSS</span>
          <span style="font-size:20px;font-weight:700">[[[
            var t = states['sensor.essig_discharge_trend_raw'].state;
            if (t === 'unavailable' || t === 'none' || t === '') return '—';
            var v = parseFloat(t);
            if (isNaN(v)) return '—';
            if (v > 0) return '⬆ ' + t + ' m³/s/h';
            if (v < 0) return '⬇ ' + t + ' m³/s/h';
            return '➡ 0 m³/s/h';
          ]]]</span>
        </div>
      status: >
        <div style="margin-top:12px;text-align:right">
          <div style="font-size:12px;color:#8e9bad;font-weight:600;letter-spacing:.06em;margin-bottom:4px">HOCHWASSERSTATUS</div>
          <span style="display:inline-block;padding:4px 14px;border-radius:14px;font-size:14px;font-weight:700;letter-spacing:.04em;[[[
            var s = states['sensor.essig_flood_status'].state;
            if (s === 'extreme') return 'background:#4a1520;color:#ff4444';
            if (s === 'hq100') return 'background:#6b2f3a;color:#ff6b6b';
            if (s === 'hq10') return 'background:#8b4530;color:#ff9a67';
            if (s === 'ev_action') return 'background:#6b5f2a;color:#ffd54f';
            if (s === 'unknown') return 'background:#5a3744;color:#ff7777';
            return 'background:#1a3a4a;color:#4fc3f7';
          ]]]">[[[
            var s = states['sensor.essig_flood_status'].state;
            if (s === 'unknown') return 'Daten veraltet';
            if (s === 'extreme') return 'HQextrem';
            if (s === 'hq100') return 'HQ100';
            if (s === 'hq10') return 'HQ10';
            if (s === 'ev_action') return 'EV-Einsatzplan';
            return 'Normal';
          ]]]</span>
        </div>
      alert: >
        <div style="margin-top:12px;display:flex;align-items:center;gap:8px;[[[
          var al = states['binary_sensor.essig_flood_alert'].state;
          if (al === 'on') return 'background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);border-radius:10px;padding:8px 12px;';
          return '';
        ]]]">
          <span style="font-size:12px;color:#8e9bad;font-weight:600">HOCHWASSERALARM</span>
          <span style="font-size:16px;font-weight:700;[[[
            var al = states['binary_sensor.essig_flood_alert'].state;
            return al === 'on' ? 'color:#ff4444' : 'color:#4caf50';
          ]]]">[[[
            var al = states['binary_sensor.essig_flood_alert'].state;
            return al === 'on' ? '🔴 AKTIV' : '✅ Kein Alarm';
          ]]]</span>
        </div>
    tap_action:
      action: url
      url_path: "https://www.erftverband.de/mapserver/arcshp/flussgebiet/klima_abfluss/howis/html/pegel/Pegel_Essig_zr.html"

  - type: custom:apexcharts-card
    experimental:
      color_thresholds:
        - value: 0
          color: "#4fc3f7"
        - value: 60
          color: "#ffd54f"
        - value: 144
          color: "#ff6b6b"
    graph_span: 48h
    show:
      loading: true
      last_updated: true
    header:
      show: false
    yaxis:
      - id: left
        min: 0
        max: ~auto
        decimals: 0
        apex_config:
          title:
            text: "cm"
            style:
              color: "#8e9bad"
              fontSize: "10px"
      - id: right
        opposite: true
        decimals: 2
        apex_config:
          title:
            text: "m³/s"
            style:
              color: "#8e9bad"
              fontSize: "10px"
    series:
      - entity: sensor.essig_water_level
        name: Wasserstand
        type: line
        curve: stepline
        stroke_width: 2
        color: "#4fc3f7"
        unit: cm
        yaxis_id: left
        group_by:
          func: avg
          duration: 5min
        show:
          legend_value: true
        opacity: 0.9
      - entity: sensor.essig_discharge
        name: Abfluss
        type: line
        curve: stepline
        stroke_width: 1.5
        stroke_dash: 4
        color: "#81deea"
        unit: "m³/s"
        yaxis_id: right
        group_by:
          func: avg
          duration: 5min
        show:
          legend_value: true
        opacity: 0.7
    all_series_config:
      float_precision: 1
    apex_config:
      chart:
        height: 200
        type: line
        zoom:
          enabled: false
        toolbar:
          show: false
        animations:
          enabled: false
      grid:
        show: true
        borderColor: "rgba(255,255,255,.06)"
        strokeDashArray: 3
      legend:
        show: true
        labels:
          colors: "#b0bcca"
        horizontalAlign: left
        fontSize: "10px"
        itemMargin:
          horizontal: 8
      xaxis:
        type: datetime
        labels:
          datetimeUTC: false
          style:
            colors: "#8e9bad"
            fontSize: "9px"
        axisBorder:
          show: false
        axisTicks:
          show: false
      yaxis:
        - labels:
            style:
              colors: "#8e9bad"
              fontSize: "9px"
        - labels:
            style:
              colors: "#8e9bad"
              fontSize: "9px"
